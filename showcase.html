<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VPINHUB Showcase</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Encode+Sans:wght@400;700;900&family=MedievalSharp&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Encode Sans', sans-serif; background: #020617; color: white; overflow-x: hidden; }
    .medieval { font-family: 'MedievalSharp', cursive; }
    .hero-gradient { background: radial-gradient(circle at top, #1e293b 0%, #020617 70%); }
    .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s ease; }
    .glass-card:hover { border-color: rgba(249, 115, 22, 0.4); background: rgba(255, 255, 255, 0.05); }
    .header-solid { background-color: #0f172a; border-bottom: 2px solid rgba(249, 115, 22, 0.3); }
  </style>
</head>

<body class="min-h-screen hero-gradient pb-20">

  <header id="topHeader" class="sticky top-0 z-40 header-solid shadow-2xl">
    <div class="container mx-auto px-6 py-6 flex flex-col items-center">
      <a href="index.html" class="hover:opacity-80 transition-opacity">
        <h1 class="text-4xl md:text-6xl font-black italic uppercase tracking-tighter">
          VPIN<span class="text-orange-500">HUB</span>
        </h1>
      </a>
      <div class="w-full max-w-2xl mt-4 relative">
        <input id="searchInput" type="text" placeholder="Search tables, authors, or features (e.g. nfozzy, fleep)..." 
               class="w-full p-4 pr-12 rounded-2xl bg-white/10 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-orange-500 transition">
        <button id="clearSearch" class="absolute right-5 top-1/2 -translate-y-1/2 text-gray-500 hover:text-orange-500 hidden text-2xl">×</button>
      </div>
    </div>
  </header>

  <main class="container mx-auto px-4 md:px-6 py-8 max-w-5xl">
    <div id="mainContent">
      <div id="results" class="space-y-4"></div>
      <div id="loader" class="text-center p-8 text-orange-500 font-bold hidden animate-pulse">
        Fetching Database...
      </div>
    </div>
    
    <div id="focusedView" class="hidden"></div>
  </main>

<script>
let db = [];
let currentItems = [];
let currentPage = 1;
const ITEMS_PER_PAGE = 25;

const resultsDiv = document.getElementById("results");
const loader = document.getElementById("loader");
const focusedView = document.getElementById("focusedView");
const mainContent = document.getElementById("mainContent");
const header = document.getElementById("topHeader");
const searchInput = document.getElementById("searchInput");
const clearSearch = document.getElementById("clearSearch");

loader.classList.remove("hidden");

fetch("https://raw.githubusercontent.com/VirtualPinballSpreadsheet/vps-db/main/db/vpsdb.json")
  .then(r => r.json())
  .then(data => {
    db = data;
    // Base table sort is still by most recently updated
    db.sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
    
    const params = new URLSearchParams(window.location.search);
    const tableId = params.get("tableId");
    const releaseId = params.get("releaseId");
    const incomingQuery = params.get("q"); 
    
    if (tableId && releaseId) {
      renderReleaseDetails(tableId, releaseId, params); 
    } else if (tableId) {
      renderTableDetails(tableId); 
    } else if (incomingQuery) {
      searchInput.value = incomingQuery;
      clearSearch.classList.remove("hidden");
      performSearch(incomingQuery);
    } else {
      renderResults(db); 
    }
    loader.classList.add("hidden");
  });

function formatDate(d) {
  if (!d) return "N/A";
  return new Date(d).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function copyTag(tag, btn) {
  navigator.clipboard.writeText(tag);
  const oldText = btn.innerText;
  const oldBg = btn.style.backgroundColor;
  btn.innerText = "Copied!";
  btn.style.backgroundColor = "#16a34a"; 
  setTimeout(() => { 
      btn.innerText = oldText; 
      btn.style.backgroundColor = oldBg; 
  }, 2000);
}

// ==========================================
// TIER 1: Search Results
// ==========================================
function renderCard(item) {
  const img = item.tableFiles?.[0]?.imgUrl || item.b2sFiles?.[0]?.imgUrl || "https://via.placeholder.com/300x200?text=No+Image";
  const vpsDate = formatDate(item.updatedAt || item.createdAt);
  const typeBadge = item.type ? `<span class="bg-white/10 text-orange-400 border border-orange-500/30 px-2 py-1 rounded-md text-[9px] font-black uppercase tracking-widest">${item.type}</span>` : '';
  
  return `
    <div onclick="navigateToTable('${item.id}')" class="glass-card rounded-2xl p-4 cursor-pointer flex items-center gap-4 md:gap-6 group">
      <img src="${img}" class="w-20 h-20 md:w-24 md:h-24 rounded-xl object-cover border border-white/10 group-hover:scale-105 transition-transform flex-shrink-0">
      <div class="flex-1 min-w-0">
        <h2 class="text-xl md:text-2xl font-black italic uppercase truncate text-white">${item.name}</h2>
        <div class="flex flex-wrap items-center gap-2 mt-1">
          ${typeBadge}
          <p class="text-[10px] md:text-xs uppercase text-gray-500 tracking-widest">${item.manufacturer || "Unknown"} ${item.year || ""}</p>
        </div>
      </div>
      <div class="text-right hidden sm:block">
        <p class="text-[9px] uppercase text-gray-600 font-bold tracking-tighter">VPS Updated</p>
        <p class="text-xs font-mono text-orange-500/80">${vpsDate}</p>
      </div>
    </div>
  `;
}

function navigateToTable(id) {
  const url = new URL(window.location);
  url.searchParams.set('tableId', id);
  url.searchParams.delete('releaseId');
  window.history.pushState({}, '', url);
  renderTableDetails(id);
}

// ==========================================
// TIER 2: Table Details (List of all releases)
// ==========================================
function renderTableDetails(tableId) {
  const item = db.find(x => x.id === tableId);
  if (!item) return;

  header.classList.add("hidden");
  mainContent.classList.add("hidden");
  focusedView.classList.remove("hidden");
  window.scrollTo(0,0);

  const preview = item.b2sFiles?.[0]?.imgUrl || item.tableFiles?.[0]?.imgUrl;
  let html = `
    <div class="flex justify-between items-center mb-8">
      <button onclick="goHome()" class="flex items-center gap-2 text-orange-500 font-black uppercase italic tracking-widest hover:gap-4 transition-all">
        ← Back to Search
      </button>
      <button onclick="copyTag(window.location.href, this)" class="bg-orange-600 hover:bg-orange-500 text-white font-black uppercase italic text-[10px] px-5 py-2 rounded-xl shadow-lg transition-all">
        Share Link
      </button>
    </div>
    
    <div class="mb-10 flex flex-col md:flex-row gap-8 items-start">
      ${preview ? `<img src="${preview}" class="w-full md:w-1/3 rounded-3xl object-cover border border-white/10 shadow-2xl">` : ''}
      <div>
        <h2 class="text-5xl md:text-7xl font-black italic uppercase leading-none text-white">${item.name}</h2>
        <p class="text-xl text-gray-500 uppercase tracking-[0.3em] mt-4">${item.manufacturer || ""} ${item.year || ""}</p>
        <p class="text-sm text-gray-400 mt-2"><strong>Theme:</strong> ${(item.theme || []).join(", ") || "N/A"}</p>
      </div>
    </div>
  `;

  // Helper to sort inner files by date before rendering
  const renderSection = (files, label, isTableFile) => {
    if (!files || !files.length) return;
    
    // Sort files by date modified descending
    const sortedFiles = [...files].sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
    
    html += `<h3 class="text-sm font-black uppercase tracking-[0.4em] text-orange-500/50 mb-6 mt-12 border-b border-white/5 pb-2">${label}</h3>`;
    sortedFiles.forEach(f => { html += renderFileItem(f, isTableFile ? "Table Release" : label, item.id, false); });
  };

  renderSection(item.tableFiles, "Table Releases", true);
  renderSection(item.b2sFiles, "B2S Backglasses", false);
  renderSection(item.romFiles, "ROMs", false);
  renderSection(item.pupPackFiles, "PUP Packs", false);
  renderSection(item.povFiles, "POV Files", false);
  renderSection(item.wheelArtFiles, "Wheel Art", false);
  renderSection(item.altColorFiles, "ALT Color", false);
  renderSection(item.altSoundFiles, "ALT Sound", false);
  renderSection(item.tutorialFiles, "Tutorial Documents", false);
  renderSection(item.tutorialVideoFiles, "Tutorial Videos", false);

  focusedView.innerHTML = html;
}

function navigateToRelease(tId, rId) {
  const url = new URL(window.location);
  url.searchParams.set('tableId', tId);
  url.searchParams.set('releaseId', rId);
  window.history.pushState({}, '', url);
  renderReleaseDetails(tId, rId, url.searchParams);
}

// ==========================================
// TIER 3: Specific Release View
// ==========================================
function renderReleaseDetails(tableId, releaseId, params) {
  const item = db.find(x => x.id === tableId);
  if (!item) return;

  header.classList.add("hidden");
  mainContent.classList.add("hidden");
  focusedView.classList.remove("hidden");
  window.scrollTo(0,0);

  let tournamentHtml = "";
  if (params.has('swl')) {
    tournamentHtml = `<div class="bg-blue-900/40 border-l-4 border-blue-500 p-6 rounded-2xl mb-8"><h3 class="text-2xl font-black italic uppercase text-white mb-2">Special When Lit</h3><p class="text-sm text-gray-300 mb-4">Submit scores via iScored. Verify your posts. Sunday 2PM ET deadline.</p><a href="https://iscored.info/?mode=public&user=vpinhub" target="_blank" class="bg-blue-600 px-6 py-2 rounded-lg font-bold text-xs uppercase italic text-white shadow-lg">Submit Score</a></div>`;
  } else if (params.has('vpc')) {
    tournamentHtml = `<div class="bg-indigo-900/40 border-l-4 border-indigo-500 p-6 rounded-2xl mb-8"><h3 class="text-2xl font-black italic uppercase text-white mb-2">VPC Competition Corner</h3><p class="text-sm text-gray-300 mb-4">Scores must be submitted in the VPC Discord with a photo. Monday 12:00 AM PST deadline.</p><a href="https://discord.com/invite/virtual-pinball-chat-652274650524418078" target="_blank" class="bg-indigo-600 px-6 py-2 rounded-lg font-bold text-xs uppercase italic text-white shadow-lg">Join Discord</a></div>`;
  } else if (params.has('ttd')) {
    tournamentHtml = `<div class="bg-orange-900/40 border-l-4 border-orange-500 p-6 rounded-2xl mb-8"><h3 class="text-2xl font-black italic uppercase text-white mb-2">Thursday Throw Down</h3><p class="text-sm text-gray-300 mb-4">Submit scores via iScored. Verify your posts. Thursday 2PM ET deadline.</p><a href="https://iscored.info/?mode=public&user=smaug" target="_blank" class="bg-orange-600 px-6 py-2 rounded-lg font-bold text-xs uppercase italic text-white shadow-lg">Submit Score</a></div>`;
  }

  const releaseFile = item.tableFiles.find(f => f.id === releaseId);
  const releaseHtml = releaseFile ? renderFileItem(releaseFile, "MAIN_RELEASE", item.id, true) : "";

  let supportingHtml = "";
  const appendSupport = (files, label) => {
    if (!files) return;
    const sortedFiles = [...files].sort((a, b) => new Date(b.updatedAt || b.createdAt || 0) - new Date(a.updatedAt || a.createdAt || 0));
    sortedFiles.forEach(f => supportingHtml += renderFileItem(f, label, item.id, true));
  };

  appendSupport(item.b2sFiles, "B2S Backglass");
  appendSupport(item.romFiles, "ROM File");
  appendSupport(item.povFiles, "POV File");
  appendSupport(item.wheelArtFiles, "Wheel Art");
  appendSupport(item.pupPackFiles, "PUP-Pack");
  appendSupport(item.altColorFiles, "ALT Color");
  appendSupport(item.altSoundFiles, "ALT Sound");
  appendSupport(item.tutorialFiles, "Tutorial Document");
  appendSupport(item.tutorialVideoFiles, "Tutorial Video");

  focusedView.innerHTML = `
    <div class="max-w-5xl mx-auto">
      <div class="flex justify-between items-center mb-8">
        <button onclick="navigateToTable('${item.id}')" class="flex items-center gap-2 text-orange-500 font-black uppercase italic tracking-widest hover:gap-4 transition-all">
          ← Back to Table Releases
        </button>
        <button onclick="copyTag(window.location.href, this)" class="bg-orange-600 hover:bg-orange-500 text-white font-black uppercase italic text-[10px] px-5 py-2 rounded-xl shadow-lg transition-all">
          Share Link
        </button>
      </div>
      
      <h2 class="text-4xl md:text-6xl font-black italic uppercase leading-none text-white mb-2">${item.name}</h2>
      <p class="text-xl text-gray-500 uppercase tracking-[0.3em] mb-10">${item.manufacturer || ""} ${item.year || ""}</p>
      
      ${tournamentHtml}
      
      <div class="space-y-6">
        ${releaseHtml}
        ${supportingHtml ? `<h3 class="text-sm font-black uppercase tracking-[0.4em] text-orange-500/50 mb-6 mt-12 border-b border-white/5 pb-2">Supporting Assets</h3>${supportingHtml}` : ''}
      </div>
    </div>
  `;
}

// ==========================================
// Reusable Component: Render a File Row
// ==========================================
function renderFileItem(file, type, gameId, isFinalView) {
  const authors = (file.authors || []).join(", ") || "Unknown";
  const fileDate = formatDate(file.updatedAt || file.createdAt); 
  
  let titleHtml = "";
  if (type === "MAIN_RELEASE") {
      titleHtml = file.version ? `Version ${file.version}` : `Release`;
  } else {
      // Removed the hardcoded 'v' here so ROMs display correctly
      const versionBadge = file.version ? `<span class="bg-white/10 text-gray-300 px-2 py-0.5 rounded text-[10px] ml-2">${file.version}</span>` : "";
      titleHtml = `${type} ${versionBadge}`;
  }

  const vpinTag = `https://virtualpinballspreadsheet.github.io/?game=${gameId}&fileType=table#${file.id}`;
  const imgHtml = file.imgUrl ? `<img src="${file.imgUrl}" class="w-24 h-24 md:w-32 md:h-32 object-cover rounded-xl border border-white/10 bg-black flex-shrink-0">` : '';

  let buttons = "";
  if (!isFinalView && (type === "Table Release" || type === "Visual Pinball Table")) {
    buttons = `
      <button onclick="navigateToRelease('${gameId}', '${file.id}')" class="bg-orange-600 hover:bg-orange-500 text-white font-black uppercase italic text-[10px] px-6 py-3 rounded-lg shadow-lg transition-all">Release Info</button>
      <button onclick="copyTag('${vpinTag}', this)" class="bg-purple-600 hover:bg-purple-500 text-white font-black uppercase italic text-[10px] px-6 py-3 rounded-lg shadow-lg transition-all">iScored Tag</button>
    `;
  } else {
    const btnText = type.includes('Tutorial') ? 'View Tutorial' : 'Download';
    const urls = file.urls || (file.url ? [{url: file.url}] : []);
    buttons = urls.map(u => `<a href="${u.url}" target="_blank" class="bg-white/10 hover:bg-white/20 text-white font-black uppercase italic text-[10px] px-6 py-3 rounded-lg border border-white/10 shadow-lg transition-all">${btnText}</a>`).join("");
  }

  return `
    <div class="glass-card rounded-2xl p-4 md:p-6 mb-4 flex flex-col md:flex-row items-start gap-4 md:gap-6">
      ${imgHtml}
      <div class="flex-1 w-full">
        <div class="flex justify-between items-start gap-4">
            <h4 class="text-lg md:text-xl font-black italic uppercase text-white flex items-center flex-wrap gap-2">${titleHtml}</h4>
            <div class="text-right hidden sm:block flex-shrink-0">
                <p class="text-[9px] uppercase text-gray-600 font-bold tracking-tighter">Updated</p>
                <p class="text-xs font-mono text-orange-500/80">${fileDate}</p>
            </div>
        </div>
        <p class="text-xs text-orange-400 font-bold uppercase tracking-widest mt-1">
            By: <span class="text-gray-200">${authors}</span>
            <span class="sm:hidden text-gray-500 ml-2 border-l border-gray-600 pl-2">${fileDate}</span>
        </p>
        <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest mt-1">Features: ${(file.features || []).join(" • ") || "Standard"}</p>
        <div class="flex flex-wrap gap-2 mt-4">${buttons}</div>
        ${file.comment ? `<p class="mt-4 text-[11px] italic text-gray-400 bg-black/40 p-3 rounded-xl border border-white/5">${file.comment}</p>` : ''}
      </div>
    </div>
  `;
}

// ==========================================
// Search & Pagination & History
// ==========================================
function renderResults(items) {
  resultsDiv.innerHTML = "";
  currentItems = items;
  currentPage = 1;
  loadMore();
}

function loadMore() {
  const start = (currentPage - 1) * ITEMS_PER_PAGE;
  const end = start + ITEMS_PER_PAGE;
  resultsDiv.insertAdjacentHTML("beforeend", currentItems.slice(start, end).map(renderCard).join(""));
  currentPage++;
  if (end >= currentItems.length) loader.classList.add("hidden");
}

function performSearch(q) {
  const query = q.toLowerCase();
  
  // ROBUST SEARCH AGGREGATOR
  const filtered = db.filter(item => {
    const searchString = [
      item.name,
      item.manufacturer,
      ...(item.theme || []),
      ...(item.tableFiles || []).flatMap(f => f.authors || []),
      ...(item.tableFiles || []).flatMap(f => f.features || []),
      ...(item.b2sFiles || []).flatMap(f => f.authors || []),
      ...(item.romFiles || []).flatMap(f => f.authors || [])
    ].join(" ").toLowerCase();
    
    return searchString.includes(query);
  });
  
  renderResults(filtered);
}

searchInput.addEventListener("input", e => {
  const val = e.target.value.trim();
  clearSearch.classList.toggle("hidden", !val);
  performSearch(val);
  
  const url = new URL(window.location);
  if (val) url.searchParams.set('q', val);
  else url.searchParams.delete('q');
  window.history.replaceState({}, '', url);
});

clearSearch.onclick = () => {
  searchInput.value = "";
  clearSearch.classList.add("hidden");
  
  const url = new URL(window.location);
  url.searchParams.delete('q');
  window.history.replaceState({}, '', url);
  
  renderResults(db);
};

function goHome() {
  const url = new URL(window.location);
  url.searchParams.delete('tableId');
  url.searchParams.delete('releaseId');
  window.history.pushState({}, '', url);
  focusedView.classList.add("hidden");
  header.classList.remove("hidden");
  mainContent.classList.remove("hidden");
  
  if (searchInput.value) {
      performSearch(searchInput.value);
  } else {
      renderResults(db); 
  }
}

window.onpopstate = () => {
  const params = new URLSearchParams(window.location.search);
  const tId = params.get("tableId");
  const rId = params.get("releaseId");
  const q = params.get("q");
  
  if (tId && rId) {
    renderReleaseDetails(tId, rId, params);
  } else if (tId) {
    renderTableDetails(tId);
  } else {
    focusedView.classList.add("hidden");
    header.classList.remove("hidden");
    mainContent.classList.remove("hidden");
    if (q) {
        searchInput.value = q;
        clearSearch.classList.remove("hidden");
        performSearch(q);
    } else {
        searchInput.value = "";
        clearSearch.classList.add("hidden");
        renderResults(db);
    }
  }
};
</script>
</body>
</html>
