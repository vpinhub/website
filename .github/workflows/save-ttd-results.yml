name: Save Thursday Throwdown Results

on:
  schedule:
    # 17:58 UTC = 1:58 pm EDT (UTC-4, Mar-Nov)
    # During EST (UTC-5, Nov-Mar) this fires at 12:58 pm — still before the 2 pm cutoff
    - cron: '58 17 * * 4'
  workflow_dispatch:   # allow manual trigger from the Actions tab

jobs:
  save-results:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch and save TTD results
        run: python scripts/save_results.py ttd

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add competition/json/
          git diff --cached --quiet && echo "Nothing to commit" || \
            git commit -m "auto: save Thursday Throwdown results $(date -u +%Y-%m-%d)"
          git push
